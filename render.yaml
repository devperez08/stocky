# Render Blueprint Specification
# Este archivo permite configurar automáticamente el servicio en Render
services:
  - type: web
    name: stocky-api
    env: python
    region: oregon # Puedes cambiar a la región más cercana a ti
    plan: free # Plan gratuito de Render
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false # 🚨 IMPORTANTE: Debes pegarla manualmente en el Dashboard de Render
      - key: SECRET_KEY
        generateValue: true # Render generará una clave segura automáticamente
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 1440
      - key: PYTHON_VERSION
        value: 3.12.3 # Ajustado a tu entorno actual
